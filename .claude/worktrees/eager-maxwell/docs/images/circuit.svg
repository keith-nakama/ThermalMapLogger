<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" font-family="monospace">

  <!-- 背景 -->
  <rect width="600" height="400" fill="#1a1a2e" rx="12"/>
  <text x="300" y="36" text-anchor="middle" fill="#4db6ac" font-size="16" font-weight="bold">ThermalMapLogger - 配線図</text>

  <!-- ========== ESP32 WROVER ========== -->
  <rect x="300" y="60" width="220" height="280" fill="#0d2137" stroke="#4db6ac" stroke-width="2" rx="8"/>
  <text x="410" y="85" text-anchor="middle" fill="#4db6ac" font-size="13" font-weight="bold">ESP32 WROVER</text>
  <text x="410" y="100" text-anchor="middle" fill="#888" font-size="9">（SDカード内蔵）</text>

  <!-- ピンラベル（左側） -->
  <text x="360" y="140" text-anchor="middle" fill="#e74c3c" font-size="11">3.3V</text>
  <line x1="300" y1="136" x2="340" y2="136" stroke="#e74c3c" stroke-width="2"/>

  <text x="360" y="170" text-anchor="middle" fill="#888" font-size="11">GND</text>
  <line x1="300" y1="166" x2="340" y2="166" stroke="#888" stroke-width="2"/>

  <text x="360" y="200" text-anchor="middle" fill="#8bc34a" font-size="11">GPIO21</text>
  <text x="360" y="213" text-anchor="middle" fill="#8bc34a" font-size="9">(SDA)</text>
  <line x1="300" y1="203" x2="340" y2="203" stroke="#8bc34a" stroke-width="2"/>

  <text x="360" y="243" text-anchor="middle" fill="#4db6ac" font-size="11">GPIO22</text>
  <text x="360" y="256" text-anchor="middle" fill="#4db6ac" font-size="9">(SCL)</text>
  <line x1="300" y1="246" x2="340" y2="246" stroke="#4db6ac" stroke-width="2"/>

  <!-- ========== AMG8833 ========== -->
  <rect x="60" y="100" width="160" height="200" fill="#0d2137" stroke="#8bc34a" stroke-width="2" rx="8"/>
  <text x="140" y="125" text-anchor="middle" fill="#8bc34a" font-size="13" font-weight="bold">AMG8833</text>
  <text x="140" y="142" text-anchor="middle" fill="#888" font-size="9">8x8 赤外線センサー</text>

  <!-- ピンラベル（右側） -->
  <text x="175" y="175" text-anchor="middle" fill="#e74c3c" font-size="11">VCC</text>
  <line x1="185" y1="171" x2="220" y2="171" stroke="#e74c3c" stroke-width="2"/>

  <text x="175" y="205" text-anchor="middle" fill="#888" font-size="11">GND</text>
  <line x1="185" y1="201" x2="220" y2="201" stroke="#888" stroke-width="2"/>

  <text x="175" y="235" text-anchor="middle" fill="#8bc34a" font-size="11">SDA</text>
  <line x1="185" y1="231" x2="220" y2="231" stroke="#8bc34a" stroke-width="2"/>

  <text x="175" y="265" text-anchor="middle" fill="#4db6ac" font-size="11">SCL</text>
  <line x1="185" y1="261" x2="220" y2="261" stroke="#4db6ac" stroke-width="2"/>

  <!-- ========== 接続ライン ========== -->
  <polyline points="220,171 260,171 260,136 300,136" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <polyline points="220,201 265,201 265,166 300,166" fill="none" stroke="#888" stroke-width="2"/>
  <polyline points="220,231 270,231 270,203 300,203" fill="none" stroke="#8bc34a" stroke-width="2"/>
  <polyline points="220,261 275,261 275,246 300,246" fill="none" stroke="#4db6ac" stroke-width="2"/>

  <!-- ========== 凡例 ========== -->
  <rect x="60" y="330" width="480" height="50" fill="#0d1117" stroke="#333" stroke-width="1" rx="6"/>
  <line x1="80" y1="352" x2="110" y2="352" stroke="#e74c3c" stroke-width="2"/>
  <text x="118" y="356" fill="#e74c3c" font-size="10">3.3V電源</text>
  <line x1="200" y1="352" x2="230" y2="352" stroke="#888" stroke-width="2"/>
  <text x="238" y="356" fill="#888" font-size="10">GND</text>
  <line x1="300" y1="352" x2="330" y2="352" stroke="#8bc34a" stroke-width="2"/>
  <text x="338" y="356" fill="#8bc34a" font-size="10">SDA (I2C)</text>
  <line x1="420" y1="352" x2="450" y2="352" stroke="#4db6ac" stroke-width="2"/>
  <text x="458" y="356" fill="#4db6ac" font-size="10">SCL (I2C)</text>

  <!-- AD0の注記 -->
  <text x="140" y="315" text-anchor="middle" fill="#ffb74d" font-size="9">※ AD0 to GND (address 0x68)</text>

</svg>
